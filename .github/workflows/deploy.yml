name: Deployment
on:
  workflow_dispatch: 
  push:
    branches:
      - main
      - master
      - dev
env:
  PORT: 8080
  MONGODB_DB_NAME: gha-demo
# mongodb+srv://krishnaunix2389_db_user:L9B9MpundeiomngZ@cluster0.e6v5bwq.mongodb.net/?appName=Cluster0
####
jobs:
  test:
    environment: testing
    env:
    # env:
      MONGODB_CLUSTER_ADDRESS: cluster0.e6v5bwq.mongodb.net
      MONGODB_USERNAME: ${{ secrets.MONGODB_USERNAME }}
      MONGODB_PASSWORD: ${{ secrets.MONGODB_PASSWORD }}
    runs-on: ubuntu-latest
    steps:
      - name: Get Code
        uses: actions/checkout@v3
      - name: Cache dependencies
        uses: actions/cache@v3
        with:
          path: ~/.npm
          key: npm-deps-${{ hashFiles('**/package-lock.json') }}
      - name: Install dependencies
        run: npm ci
      - name: Run server
        run: npm start & npx wait-on http://127.0.0.1:$PORT
      - name: Run tests
        run: npm test
      - name: Output information
        run: | 
          echo "MONGODB_USERNAME: ${{ env.MONGODB_USERNAME }}"
  deploy:
    environment: testing
    env:
      MONGODB_CLUSTER_ADDRESS: cluster0.e6v5bwq.mongodb.net
      # MONGODB_USERNAME: krishnaunix2389_db_user
      # MONGODB_PASSWORD: L9B9MpundeiomngZ 
      # MONGODB_PASSWORD: fAoQ2k6eR1t2fD0Q
      MONGODB_DB_NAME: ${{ secrets.MONGODB_USERNAME }}
      MONGODB_PASSWORD: ${{ secrets.MONGODB_PASSWORD }}
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Output information
        run: |        
          echo "MONGODB_USERNAME: $MONGODB_DB_NAME"
          echo "MONGODB_DB_NAME: $MONGODB_DB_NAME"
